name: .NET Core CI Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'netapps/webapplication1/**'
      - '.github/workflows/dotnet-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'netapps/webapplication1/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'netapps/WebApplication1'
  ARTIFACTS_PATH: 'artifacts'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build, Test & Quality Check

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore "${{ env.PROJECT_PATH }}"
      
    - name: Build
      run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release --no-restore
      
    - name: Run tests
      run: dotnet test "${{ env.PROJECT_PATH }}" --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
      continue-on-error: true

    - name: Code Quality - Static Analysis
      run: |
        dotnet tool install -g dotnet-format
        dotnet format "${{ env.PROJECT_PATH }}" --verify-no-changes --verbosity diagnostic || echo "Code format check completed"
      continue-on-error: true

    - name: SonarQube Scan (Optional - Configure your token)
      run: |
        echo "SonarQube scan can be integrated here"
        echo "Uncomment and configure when ready with SonarQube instance"
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          ${{ env.PROJECT_PATH }}/**/TestResults/
          ${{ env.PROJECT_PATH }}/**/test-results.trx

    - name: Publish test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: .NET Test Results
        path: '${{ env.PROJECT_PATH }}/**/test-results.trx'
        reporter: 'dotnet trx'
      continue-on-error: true

  publish-artifacts:
    runs-on: ubuntu-latest
    name: Publish Artifacts
    needs: build-and-test
    if: success()

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore "${{ env.PROJECT_PATH }}"

    - name: Publish as self-contained
      run: dotnet publish "${{ env.PROJECT_PATH }}" --configuration Release --output "${{ env.ARTIFACTS_PATH }}/publish" --self-contained false

    - name: Create deployment package
      run: |
        cd ${{ env.ARTIFACTS_PATH }}
        tar -czf webapplication1-release.tar.gz publish/
        ls -lh webapplication1-release.tar.gz

    - name: Upload published artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-artifacts
        path: ${{ env.ARTIFACTS_PATH }}/webapplication1-release.tar.gz
        retention-days: 30

    - name: Create GitHub Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.ARTIFACTS_PATH }}/webapplication1-release.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
