name: Angular CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      artifact_run_id:
        description: 'Optional Angular CI run ID to deploy. Leave blank to use the latest successful angular-ci.yml run on this branch.'
        required: false
        type: string

permissions:
  contents: read
  actions: read

env:
  ARTIFACTS_PATH: 'artifacts'
  DEPLOY_PACKAGE_NAME: 'angular-app.zip'
  # ===== CHANGE THESE VALUES =====
  AZURE_RESOURCE_GROUP: 'rg-learn-md'
  AZURE_STAGING_APP_SERVICE: 'mdussa-task-ui'
  AZURE_PRODUCTION_APP_SERVICE: 'mdussa-task-ui'
  # Required secret: AZURE_CREDENTIALS
  # ===============================

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy Angular to Staging
    if: github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://${{ env.AZURE_STAGING_APP_SERVICE }}.azurewebsites.net

    steps:
    - name: Resolve CI run ID
      id: resolve-run
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const providedRunId = `${{ inputs.artifact_run_id }}`.trim();
          if (providedRunId) {
            core.info(`Using provided CI run ID: ${providedRunId}`);
            core.setOutput('run_id', providedRunId);
            return;
          }

          const branch = context.ref.replace('refs/heads/', '');
          const response = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'angular-ci.yml',
            branch,
            status: 'completed',
            per_page: 20,
          });

          const latestSuccessfulRun = response.data.workflow_runs.find(
            (run) => run.conclusion === 'success'
          );

          if (!latestSuccessfulRun) {
            core.setFailed(`No successful angular-ci.yml run found on branch '${branch}'.`);
            return;
          }

          core.info(`Using latest successful CI run ID: ${latestSuccessfulRun.id}`);
          core.setOutput('run_id', String(latestSuccessfulRun.id));

    - name: Download CI artifact
      uses: actions/download-artifact@v4
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        run-id: ${{ steps.resolve-run.outputs.run_id }}
        name: angular-artifacts
        path: ${{ env.ARTIFACTS_PATH }}

    - name: Verify deployment package
      run: |
        if [ ! -f "${{ env.ARTIFACTS_PATH }}/${{ env.DEPLOY_PACKAGE_NAME }}" ]; then
          echo "Deployment package not found at ${{ env.ARTIFACTS_PATH }}/${{ env.DEPLOY_PACKAGE_NAME }}"
          exit 1
        fi
        ls -lh "${{ env.ARTIFACTS_PATH }}/${{ env.DEPLOY_PACKAGE_NAME }}"

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure App Service - Staging
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_STAGING_APP_SERVICE }}
        package: ${{ env.ARTIFACTS_PATH }}/${{ env.DEPLOY_PACKAGE_NAME }}
        resource-group: ${{ env.AZURE_RESOURCE_GROUP }}

    - name: Verify staging deployment
      run: |
        curl -f https://${{ env.AZURE_STAGING_APP_SERVICE }}.azurewebsites.net/ || echo "Application is starting"
      continue-on-error: true

    - name: Generate staging deployment summary
      if: always()
      run: |
        echo "# Angular Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: Staging" >> $GITHUB_STEP_SUMMARY
        echo "- **App Service**: ${{ env.AZURE_STAGING_APP_SERVICE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Artifact Run ID**: ${{ steps.resolve-run.outputs.run_id }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Package**: ${{ env.DEPLOY_PACKAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "- **URL**: https://${{ env.AZURE_STAGING_APP_SERVICE }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
        echo "- **Required Secret**: AZURE_CREDENTIALS" >> $GITHUB_STEP_SUMMARY
        echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY

    - name: Azure Logout
      if: always()
      run: |
        az logout
        az cache purge

  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy Angular to Production
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://${{ env.AZURE_PRODUCTION_APP_SERVICE }}.azurewebsites.net

    steps:
    - name: Resolve CI run ID
      id: resolve-run
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const providedRunId = `${{ inputs.artifact_run_id }}`.trim();
          if (providedRunId) {
            core.info(`Using provided CI run ID: ${providedRunId}`);
            core.setOutput('run_id', providedRunId);
            return;
          }

          const branch = context.ref.replace('refs/heads/', '');
          const response = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'angular-ci.yml',
            branch,
            status: 'completed',
            per_page: 20,
          });

          const latestSuccessfulRun = response.data.workflow_runs.find(
            (run) => run.conclusion === 'success'
          );

          if (!latestSuccessfulRun) {
            core.setFailed(`No successful angular-ci.yml run found on branch '${branch}'.`);
            return;
          }

          core.info(`Using latest successful CI run ID: ${latestSuccessfulRun.id}`);
          core.setOutput('run_id', String(latestSuccessfulRun.id));

    - name: Download CI artifact
      uses: actions/download-artifact@v4
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        run-id: ${{ steps.resolve-run.outputs.run_id }}
        name: angular-artifacts
        path: ${{ env.ARTIFACTS_PATH }}

    - name: Verify deployment package
      run: |
        if [ ! -f "${{ env.ARTIFACTS_PATH }}/${{ env.DEPLOY_PACKAGE_NAME }}" ]; then
          echo "Deployment package not found at ${{ env.ARTIFACTS_PATH }}/${{ env.DEPLOY_PACKAGE_NAME }}"
          exit 1
        fi
        ls -lh "${{ env.ARTIFACTS_PATH }}/${{ env.DEPLOY_PACKAGE_NAME }}"

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure App Service - Production
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_PRODUCTION_APP_SERVICE }}
        package: ${{ env.ARTIFACTS_PATH }}/${{ env.DEPLOY_PACKAGE_NAME }}
        resource-group: ${{ env.AZURE_RESOURCE_GROUP }}

    - name: Verify production deployment
      run: |
        curl -f https://${{ env.AZURE_PRODUCTION_APP_SERVICE }}.azurewebsites.net/ || echo "Application is starting"
      continue-on-error: true

    - name: Generate production deployment summary
      if: always()
      run: |
        echo "# Angular Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
        echo "- **App Service**: ${{ env.AZURE_PRODUCTION_APP_SERVICE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Artifact Run ID**: ${{ steps.resolve-run.outputs.run_id }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Package**: ${{ env.DEPLOY_PACKAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "- **URL**: https://${{ env.AZURE_PRODUCTION_APP_SERVICE }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
        echo "- **Required Secret**: AZURE_CREDENTIALS" >> $GITHUB_STEP_SUMMARY
        echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY

    - name: Azure Logout
      if: always()
      run: |
        az logout
        az cache purge
