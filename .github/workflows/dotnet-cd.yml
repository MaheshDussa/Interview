name: .NET Core CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      artifact_run_id:
        description: 'Optional .NET CI run ID to deploy. Leave blank to use the latest successful dotnet-ci.yml run on this branch.'
        required: false
        type: string

permissions:
  contents: read
  actions: read

env:
  ARTIFACTS_PATH: 'artifacts'
  DEPLOY_PACKAGE_NAME: 'webapplication1-release.tar.gz'
  EXTRACTED_PATH: 'artifacts/extracted'
  # ===== CHANGE THESE VALUES =====
  AZURE_RESOURCE_GROUP: 'rg-learn-md'
  AZURE_STAGING_APP_SERVICE: 'mdussa-task-api'
  AZURE_PRODUCTION_APP_SERVICE: 'mdussa-task-api'
  # ===============================

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    if: github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://${{ env.AZURE_STAGING_APP_SERVICE }}.azurewebsites.net

    steps:
    - name: Resolve CI run ID
      id: resolve-run
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const providedRunId = `${{ inputs.artifact_run_id }}`.trim();
          if (providedRunId) {
            core.info(`Using provided CI run ID: ${providedRunId}`);
            core.setOutput('run_id', providedRunId);
            return;
          }

          const branch = context.ref.replace('refs/heads/', '');
          const response = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'dotnet-ci.yml',
            branch,
            status: 'completed',
            per_page: 20,
          });

          const latestSuccessfulRun = response.data.workflow_runs.find(
            (run) => run.conclusion === 'success'
          );

          if (!latestSuccessfulRun) {
            core.setFailed(`No successful dotnet-ci.yml run found on branch '${branch}'.`);
            return;
          }

          core.info(`Using latest successful CI run ID: ${latestSuccessfulRun.id}`);
          core.setOutput('run_id', String(latestSuccessfulRun.id));

    - name: Download CI artifact
      uses: actions/download-artifact@v4
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        run-id: ${{ steps.resolve-run.outputs.run_id }}
        name: dotnet-artifacts
        path: ${{ env.ARTIFACTS_PATH }}

    - name: Extract deployment package
      run: |
        mkdir -p "${{ env.EXTRACTED_PATH }}"
        tar -xzf "${{ env.ARTIFACTS_PATH }}/${{ env.DEPLOY_PACKAGE_NAME }}" -C "${{ env.EXTRACTED_PATH }}"
        ls -la "${{ env.EXTRACTED_PATH }}/publish"

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure App Service - Staging
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_STAGING_APP_SERVICE }}
        package: ${{ env.EXTRACTED_PATH }}/publish
        resource-group: ${{ env.AZURE_RESOURCE_GROUP }}

    - name: Verify Staging Deployment
      run: |
        echo "Waiting for app to be ready..."
        sleep 10
        echo "Checking application health..."
        curl -f https://${{ env.AZURE_STAGING_APP_SERVICE }}.azurewebsites.net/ || echo "Application is starting"
      continue-on-error: true

    - name: Generate Staging Deployment Summary
      if: always()
      run: |
        echo "# .NET Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: 🔵 Staging" >> $GITHUB_STEP_SUMMARY
        echo "- **App Service**: ${{ env.AZURE_STAGING_APP_SERVICE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Artifact Run ID**: ${{ steps.resolve-run.outputs.run_id }}" >> $GITHUB_STEP_SUMMARY
        echo "- **URL**: https://${{ env.AZURE_STAGING_APP_SERVICE }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
        echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
        echo "1. Test the staging deployment" >> $GITHUB_STEP_SUMMARY
        echo "2. Run this workflow again and select 'production' to deploy to production" >> $GITHUB_STEP_SUMMARY

    - name: Azure Logout
      if: always()
      run: |
        az logout
        az cache purge

  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://${{ env.AZURE_PRODUCTION_APP_SERVICE }}.azurewebsites.net

    steps:
    - name: Resolve CI run ID
      id: resolve-run
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const providedRunId = `${{ inputs.artifact_run_id }}`.trim();
          if (providedRunId) {
            core.info(`Using provided CI run ID: ${providedRunId}`);
            core.setOutput('run_id', providedRunId);
            return;
          }

          const branch = context.ref.replace('refs/heads/', '');
          const response = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'dotnet-ci.yml',
            branch,
            status: 'completed',
            per_page: 20,
          });

          const latestSuccessfulRun = response.data.workflow_runs.find(
            (run) => run.conclusion === 'success'
          );

          if (!latestSuccessfulRun) {
            core.setFailed(`No successful dotnet-ci.yml run found on branch '${branch}'.`);
            return;
          }

          core.info(`Using latest successful CI run ID: ${latestSuccessfulRun.id}`);
          core.setOutput('run_id', String(latestSuccessfulRun.id));

    - name: Download CI artifact
      uses: actions/download-artifact@v4
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        run-id: ${{ steps.resolve-run.outputs.run_id }}
        name: dotnet-artifacts
        path: ${{ env.ARTIFACTS_PATH }}

    - name: Extract deployment package
      run: |
        mkdir -p "${{ env.EXTRACTED_PATH }}"
        tar -xzf "${{ env.ARTIFACTS_PATH }}/${{ env.DEPLOY_PACKAGE_NAME }}" -C "${{ env.EXTRACTED_PATH }}"
        ls -la "${{ env.EXTRACTED_PATH }}/publish"

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: ⚠️ Deploy to Azure App Service - Production
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_PRODUCTION_APP_SERVICE }}
        package: ${{ env.EXTRACTED_PATH }}/publish
        resource-group: ${{ env.AZURE_RESOURCE_GROUP }}

    - name: Verify Production Deployment
      run: |
        echo "Waiting for app to be ready..."
        sleep 10
        echo "Checking application health..."
        curl -f https://${{ env.AZURE_PRODUCTION_APP_SERVICE }}.azurewebsites.net/ || echo "Application is starting"
      continue-on-error: true

    - name: Generate Production Deployment Summary
      if: always()
      run: |
        echo "# .NET Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: 🔴 Production" >> $GITHUB_STEP_SUMMARY
        echo "- **App Service**: ${{ env.AZURE_PRODUCTION_APP_SERVICE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Artifact Run ID**: ${{ steps.resolve-run.outputs.run_id }}" >> $GITHUB_STEP_SUMMARY
        echo "- **URL**: https://${{ env.AZURE_PRODUCTION_APP_SERVICE }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
        echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
        echo "- Deployment Type: Direct (Default)" >> $GITHUB_STEP_SUMMARY
        echo "- No downtime slots configured" >> $GITHUB_STEP_SUMMARY
        echo "- Application should be live within 30 seconds" >> $GITHUB_STEP_SUMMARY

    - name: Azure Logout
      if: always()
      run: |
        az logout
        az cache purge
