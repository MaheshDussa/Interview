name: .NET Core CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'netapps/WebApplication1'
  ARTIFACTS_PATH: 'artifacts'
  # ===== CHANGE THESE VALUES =====
  AZURE_RESOURCE_GROUP: 'your-resource-group-name'
  AZURE_STAGING_APP_SERVICE: 'your-dotnet-app-staging'
  AZURE_PRODUCTION_APP_SERVICE: 'your-dotnet-app-production'
  # ===============================

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    if: github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://${{ env.AZURE_STAGING_APP_SERVICE }}.azurewebsites.net

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore "${{ env.PROJECT_PATH }}"

    - name: Build Release
      run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release --no-restore

    - name: Publish Release
      run: dotnet publish "${{ env.PROJECT_PATH }}" --configuration Release --output "${{ env.ARTIFACTS_PATH }}/publish" --self-contained false

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure App Service - Staging
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_STAGING_APP_SERVICE }}
        package: ${{ env.ARTIFACTS_PATH }}/publish
        resource-group: ${{ env.AZURE_RESOURCE_GROUP }}

    - name: Verify Staging Deployment
      run: |
        echo "Waiting for app to be ready..."
        sleep 10
        echo "Checking application health..."
        curl -f https://${{ env.AZURE_STAGING_APP_SERVICE }}.azurewebsites.net/ || echo "Application is starting"
      continue-on-error: true

    - name: Generate Staging Deployment Summary
      if: always()
      run: |
        echo "# .NET Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: 🔵 Staging" >> $GITHUB_STEP_SUMMARY
        echo "- **App Service**: ${{ env.AZURE_STAGING_APP_SERVICE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **URL**: https://${{ env.AZURE_STAGING_APP_SERVICE }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
        echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
        echo "1. Test the staging deployment" >> $GITHUB_STEP_SUMMARY
        echo "2. Run this workflow again and select 'production' to deploy to production" >> $GITHUB_STEP_SUMMARY

    - name: Azure Logout
      if: always()
      run: |
        az logout
        az cache purge

  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://${{ env.AZURE_PRODUCTION_APP_SERVICE }}.azurewebsites.net

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore "${{ env.PROJECT_PATH }}"

    - name: Build Release
      run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release --no-restore

    - name: Publish Release
      run: dotnet publish "${{ env.PROJECT_PATH }}" --configuration Release --output "${{ env.ARTIFACTS_PATH }}/publish" --self-contained false

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: ⚠️ Deploy to Azure App Service - Production
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_PRODUCTION_APP_SERVICE }}
        package: ${{ env.ARTIFACTS_PATH }}/publish
        resource-group: ${{ env.AZURE_RESOURCE_GROUP }}

    - name: Verify Production Deployment
      run: |
        echo "Waiting for app to be ready..."
        sleep 10
        echo "Checking application health..."
        curl -f https://${{ env.AZURE_PRODUCTION_APP_SERVICE }}.azurewebsites.net/ || echo "Application is starting"
      continue-on-error: true

    - name: Generate Production Deployment Summary
      if: always()
      run: |
        echo "# .NET Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: 🔴 Production" >> $GITHUB_STEP_SUMMARY
        echo "- **App Service**: ${{ env.AZURE_PRODUCTION_APP_SERVICE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **URL**: https://${{ env.AZURE_PRODUCTION_APP_SERVICE }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
        echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
        echo "- Deployment Type: Direct (Default)" >> $GITHUB_STEP_SUMMARY
        echo "- No downtime slots configured" >> $GITHUB_STEP_SUMMARY
        echo "- Application should be live within 30 seconds" >> $GITHUB_STEP_SUMMARY

    - name: Azure Logout
      if: always()
      run: |
        az logout
        az cache purge
