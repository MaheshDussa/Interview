name: Database CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      artifact_run_id:
        description: 'Optional database CI run ID to deploy. Leave blank to use the latest successful db-ci.yml run on this branch.'
        required: false
        type: string

permissions:
  contents: read
  actions: read

env:
  DOTNET_VERSION: '8.0.x'
  ARTIFACTS_PATH: 'artifacts'
  EXTRACTED_PATH: 'artifacts/extracted'
  DACPAC_NAME: 'dblearning.dacpac'
  # ===== CHANGE THESE VALUES =====
  AZURE_SQL_SERVER_FQDN: 'mdussa-tasks.database.windows.net'
  AZURE_SQL_ADMIN_USERNAME: 'mdussa-admin'
  AZURE_STAGING_DATABASE_NAME: 'learning'
  AZURE_PRODUCTION_DATABASE_NAME: 'learning'
  # Required secret: AZURE_CREDENTIALS
  # Required environment secret: AZURE_SQL_ADMIN_PASSWORD
  # Ensure Azure SQL firewall rules allow the GitHub runner, or enable Azure services access.
  # ===============================

jobs:
  deploy-staging:
    runs-on: windows-latest
    name: Deploy Database to Staging
    if: github.event.inputs.environment == 'staging'
    environment:
      name: staging

    steps:
    - name: Resolve CI run ID
      id: resolve-run
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const providedRunId = `${{ inputs.artifact_run_id }}`.trim();
          if (providedRunId) {
            core.info(`Using provided CI run ID: ${providedRunId}`);
            core.setOutput('run_id', providedRunId);
            return;
          }

          const branch = context.ref.replace('refs/heads/', '');
          const response = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'db-ci.yml',
            branch,
            status: 'completed',
            per_page: 20,
          });

          const latestSuccessfulRun = response.data.workflow_runs.find(
            (run) => run.conclusion === 'success'
          );

          if (!latestSuccessfulRun) {
            core.setFailed(`No successful db-ci.yml run found on branch '${branch}'.`);
            return;
          }

          core.info(`Using latest successful CI run ID: ${latestSuccessfulRun.id}`);
          core.setOutput('run_id', String(latestSuccessfulRun.id));

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install SqlPackage
      shell: pwsh
      run: dotnet tool install --global microsoft.sqlpackage

    - name: Download CI artifact
      uses: actions/download-artifact@v4
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        run-id: ${{ steps.resolve-run.outputs.run_id }}
        name: database-artifacts
        path: ${{ env.ARTIFACTS_PATH }}

    - name: Extract deployment package
      shell: pwsh
      run: |
        Expand-Archive -Path (Join-Path $env:GITHUB_WORKSPACE "${{ env.ARTIFACTS_PATH }}/database-build.zip") -DestinationPath (Join-Path $env:GITHUB_WORKSPACE "${{ env.EXTRACTED_PATH }}") -Force
        $dacpacPath = Join-Path $env:GITHUB_WORKSPACE "${{ env.EXTRACTED_PATH }}/${{ env.DACPAC_NAME }}"
        if (-not (Test-Path $dacpacPath)) {
          Write-Error "DACPAC not found at expected path: $dacpacPath"
        }
        Write-Host "DACPAC found at: $dacpacPath"

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Publish DACPAC to staging database
      shell: pwsh
      env:
        SQL_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
      run: |
        $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
        $dacpacPath = Join-Path $env:GITHUB_WORKSPACE "${{ env.EXTRACTED_PATH }}/${{ env.DACPAC_NAME }}"

        sqlpackage /Action:Publish `
          /SourceFile:"$dacpacPath" `
          /TargetServerName:"${{ env.AZURE_SQL_SERVER_FQDN }}" `
          /TargetDatabaseName:"${{ env.AZURE_STAGING_DATABASE_NAME }}" `
          /TargetUser:"${{ env.AZURE_SQL_ADMIN_USERNAME }}" `
          /TargetPassword:"$env:SQL_PASSWORD" `
          /p:BlockOnPossibleDataLoss=false `
          /p:DropObjectsNotInSource=false

    - name: Generate staging deployment summary
      if: always()
      shell: pwsh
      run: |
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '# Database Staging Deployment Summary'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Environment**: Staging'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Server**: ${{ env.AZURE_SQL_SERVER_FQDN }}'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Database**: ${{ env.AZURE_STAGING_DATABASE_NAME }}'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Artifact Run ID**: ${{ steps.resolve-run.outputs.run_id }}'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Artifact**: ${{ env.DACPAC_NAME }}'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Required Secret**: AZURE_CREDENTIALS'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Required Environment Secret**: AZURE_SQL_ADMIN_PASSWORD'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Timestamp**: $(Get-Date -Format u)'

    - name: Azure Logout
      if: always()
      shell: pwsh
      run: |
        az logout
        az cache purge

  deploy-production:
    runs-on: windows-latest
    name: Deploy Database to Production
    if: github.event.inputs.environment == 'production'
    environment:
      name: production

    steps:
    - name: Resolve CI run ID
      id: resolve-run
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const providedRunId = `${{ inputs.artifact_run_id }}`.trim();
          if (providedRunId) {
            core.info(`Using provided CI run ID: ${providedRunId}`);
            core.setOutput('run_id', providedRunId);
            return;
          }

          const branch = context.ref.replace('refs/heads/', '');
          const response = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'db-ci.yml',
            branch,
            status: 'completed',
            per_page: 20,
          });

          const latestSuccessfulRun = response.data.workflow_runs.find(
            (run) => run.conclusion === 'success'
          );

          if (!latestSuccessfulRun) {
            core.setFailed(`No successful db-ci.yml run found on branch '${branch}'.`);
            return;
          }

          core.info(`Using latest successful CI run ID: ${latestSuccessfulRun.id}`);
          core.setOutput('run_id', String(latestSuccessfulRun.id));

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install SqlPackage
      shell: pwsh
      run: dotnet tool install --global microsoft.sqlpackage

    - name: Download CI artifact
      uses: actions/download-artifact@v4
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        run-id: ${{ steps.resolve-run.outputs.run_id }}
        name: database-artifacts
        path: ${{ env.ARTIFACTS_PATH }}

    - name: Extract deployment package
      shell: pwsh
      run: |
        Expand-Archive -Path (Join-Path $env:GITHUB_WORKSPACE "${{ env.ARTIFACTS_PATH }}/database-build.zip") -DestinationPath (Join-Path $env:GITHUB_WORKSPACE "${{ env.EXTRACTED_PATH }}") -Force
        $dacpacPath = Join-Path $env:GITHUB_WORKSPACE "${{ env.EXTRACTED_PATH }}/${{ env.DACPAC_NAME }}"
        if (-not (Test-Path $dacpacPath)) {
          Write-Error "DACPAC not found at expected path: $dacpacPath"
        }
        Write-Host "DACPAC found at: $dacpacPath"

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Publish DACPAC to production database
      shell: pwsh
      env:
        SQL_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
      run: |
        $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
        $dacpacPath = Join-Path $env:GITHUB_WORKSPACE "${{ env.EXTRACTED_PATH }}/${{ env.DACPAC_NAME }}"

        sqlpackage /Action:Publish `
          /SourceFile:"$dacpacPath" `
          /TargetServerName:"${{ env.AZURE_SQL_SERVER_FQDN }}" `
          /TargetDatabaseName:"${{ env.AZURE_PRODUCTION_DATABASE_NAME }}" `
          /TargetUser:"${{ env.AZURE_SQL_ADMIN_USERNAME }}" `
          /TargetPassword:"$env:SQL_PASSWORD" `
          /p:BlockOnPossibleDataLoss=false `
          /p:DropObjectsNotInSource=false

    - name: Generate production deployment summary
      if: always()
      shell: pwsh
      run: |
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '# Database Production Deployment Summary'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Environment**: Production'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Server**: ${{ env.AZURE_SQL_SERVER_FQDN }}'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Database**: ${{ env.AZURE_PRODUCTION_DATABASE_NAME }}'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Artifact Run ID**: ${{ steps.resolve-run.outputs.run_id }}'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Artifact**: ${{ env.DACPAC_NAME }}'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Required Secret**: AZURE_CREDENTIALS'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Required Environment Secret**: AZURE_SQL_ADMIN_PASSWORD'
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- **Timestamp**: $(Get-Date -Format u)'

    - name: Azure Logout
      if: always()
      shell: pwsh
      run: |
        az logout
        az cache purge
